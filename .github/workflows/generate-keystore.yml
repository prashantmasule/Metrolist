name: Generate Debug Keystore

on:
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Java 11
        uses: actions/setup-java@v4
        with:
          java-version: '11'
          distribution: 'temurin'

      - name: Generate keystore with legacy format
        run: |
          keytool -genkeypair \
            -keystore app/persistent-debug.keystore \
            -alias androiddebugkey \
            -keypass android \
            -storepass android \
            -dname "CN=Android Debug,O=Android,C=US" \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -storetype JKS
          echo "Keystore generated successfully"
          ls -lh app/persistent-debug.keystore

      - name: Commit keystore to repo
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -f app/persistent-debug.keystore
          git commit -m "fix: regenerate keystore in JKS format for Android compatibility"
          git push
